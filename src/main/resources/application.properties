### Spring
spring.application.name=images

# Cors
spring.cors.allow-credentials=true
spring.cors.allowed-methods=GET, POST, OPTIONS
spring.cors.allowed-origins=

# Mongo
spring.data.mongodb.host=
spring.data.mongodb.database=images
spring.data.mongodb.username=images
spring.data.mongodb.password=

# Redis (optional)
spring.data.redis.host=localhost
spring.data.redis.username=
spring.data.redis.password=

# Task Execution
spring.task.execution.pool.core-size=8
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=1000

# Scheduling
spring.task.scheduling.pool.size=5

# Servlets
spring.servlet.multipart.max-file-size=10485760

### Java
url.connect.timeout=3000
url.read.timeout=5000

### App
# Feed
image.feed.batch-size=30
webhook.feed.batch-size=30

# Generic
image.allowed.types=JPEG, PNG, WEBP

# Image processor
image.processor.rate=10000
image.processor.tasks=CROP, RESIZE
image.processor.editable.types=JPEG, PNG
image.timeout.setter.cron=0 * * * * ?
image.timeout=10

# Webhooks
image.webhook.sender.rate=10000
image.webhook.timeout.setter.cron=0 * * * * ?
image.webhook.timeout=10
image.webhook.tries=3
image.webhook.tries.distance=10
image.webhook.url=

# Distributed lock
lock.enabled=false
lock.timeout=10
